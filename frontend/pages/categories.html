<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - FinanceOps</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Global Loader -->
    <div id="loader" class="neo-loader-overlay d-none">
        <div class="neo-loader-spinner"></div>
        <div class="mt-4 brand-font fs-3 text-dark">PROCESSING...</div>
    </div>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-neo py-3 mb-5" style="background-color: var(--bg-color);">
        <div class="container">
            <a class="navbar-brand fs-3 brand-font text-dark text-decoration-none" href="#">[ Ops ] Dashboard</a>
            <button class="navbar-toggler border-dark border-3 rounded-0 bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2 align-items-lg-center">
                    <li class="nav-item"><a class="nav-link fw-bold text-dark nav-hover-fx px-3" href="dashboard.html">Overview</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark nav-hover-fx px-3" href="transactions.html" id="txnLink">Transactions</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark border border-2 border-transparent px-3" href="categories.html" id="catLink" style="background-color:#4ade80; border-color:#000!important; box-shadow: 2px 2px 0px #000;">Categories</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark nav-hover-fx px-3" href="users.html" id="userLink">Users</a></li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0"><button class="btn btn-neo bg-white py-1 px-3 w-100 fs-6 text-dark" onclick="logout()">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5 gs-reveal">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="brand-font display-5 mb-0">/// Category Management</h2>
        </div>

        <!-- Add Category -->
        <div class="card-neo p-4 bg-white mb-5 gs-table">
            <h5 class="brand-font fs-3 mb-4 d-inline-block p-2 text-dark" style="background-color: var(--primary-color); border: 2px solid #000;">Define Structure</h5>

            <div class="row g-3 align-items-end">
                <div class="col-md-6">
                    <label class="fw-bold text-dark mb-1">New Category Title</label>
                    <input type="text" id="catName" class="form-control form-control-lg border-dark border-3" placeholder="e.g. Infrastructure, Payroll...">
                </div>
                <div class="col-md-6">
                    <button class="btn btn-neo btn-neo-primary btn-lg px-5 mt-2 w-100" onclick="createCategory()">Create Node</button>
                </div>
            </div>
        </div>

        <!-- Categories Table -->
        <div class="card-neo p-0 bg-white gs-table overflow-hidden shadow-none border-0">
            <div class="table-responsive">
                <table class="table table-neo mb-0 text-dark">
                    <thead>
                        <tr class="fs-5">
                            <th style="width: 15%">ID</th>
                            <th style="width: 45%">Category Identity</th>
                            <th style="width: 15%">Node Status</th>
                            <th style="width: 25%" class="text-center">Admin Actions</th>
                        </tr>
                    </thead>
                    <tbody id="catTable" class="fw-bold text-dark fs-6"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <!-- Neobrutalist Modal Base -->
        <div class="modal-content border-dark border-3 rounded-0 bg-white" style="box-shadow: 12px 12px 0px #000;">
          <div class="p-4 pt-5 pb-5">
              <h3 class="brand-font display-6 mb-4 border-bottom border-dark border-3 pb-3 text-dark">Re-Identity Category</h3>
              <input type="hidden" id="editId">
              
              <div class="mb-5">
                  <label class="fw-bolder fs-5 text-dark mb-2">Category Identification String:</label>
                  <input type="text" id="editName" class="form-control form-control-lg border-dark border-3 shadow-none fw-bold text-dark fs-4">
              </div>
              
              <div class="d-flex justify-content-end gap-3 mt-4 pt-2">
                  <button class="btn btn-neo bg-light" data-bs-dismiss="modal">Cancel</button>
                  <button class="btn btn-neo btn-neo-primary" onclick="submitEdit()">Save New Identity</button>
              </div>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/pages/categories.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.from(".navbar", { y: -80, opacity: 0, duration: 0.5, ease: "power3.out" });
            gsap.from("h2", { x: -50, opacity: 0, duration: 0.6, ease: "back.out(1.2)" });
            gsap.from(".gs-table", { y: 60, opacity: 0, duration: 0.6, stagger: 0.2, delay: 0.2, ease: "back.out(1.2)" });
        });
    </script>
</body>
</html>
