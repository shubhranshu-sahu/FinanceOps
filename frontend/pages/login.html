<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinanceOps</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-neo py-3">
        <div class="container">
            <a class="navbar-brand fs-3 brand-font text-decoration-none" href="../index.html">FinanceOps</a>
            <div class="ms-auto">
                <a href="register.html" class="btn btn-neo btn-neo-primary">Register</a>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center mt-5 pt-4 gs-reveal">
        <div class="card-neo p-5" style="width: 450px; background-color: var(--card-bg);">
            <div class="text-center mb-4">
                <h2 class="brand-font display-6 mb-1">Login</h2>
                <p class="fw-bold" style="font-size: 1.1rem;">Access your dashboard.</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-4">
                    <label class="fw-bolder mb-2 fs-5">Email Address</label>
                    <input type="email" class="form-control form-control-lg" id="email" required placeholder="you@example.com" style="font-size: 1.1rem; padding: 12px;">
                </div>
                
                <div class="mb-4">
                    <label class="fw-bolder mb-2 fs-5">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" required placeholder="••••••••" style="font-size: 1.1rem; padding: 12px;">
                </div>
                
                <button type="submit" class="btn btn-neo btn-neo-primary w-100 py-3 mt-2 fs-5">Enter System</button>
            </form>
            
            <div class="mt-4 text-center">
                <p class="fw-bold fs-6">
                    New here? <br><a href="register.html" class="d-inline-block mt-2 fs-5" style="text-decoration: underline; text-decoration-thickness: 3px; text-underline-offset: 4px;">Create an account</a>
                </p>
            </div>
            
            <!-- Error message container -->
            <div id="error" class="fw-bolder text-center mt-3 fs-5" style="color: var(--secondary-color);"></div>
        </div>
    </div>
    
    <!-- JS -->
    <script src="../js/config.js"></script>
    <script src="../js/pages/login.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.from(".navbar", { y: -100, opacity: 0, duration: 0.5, ease: "power3.out" });
            gsap.from(".gs-reveal", { y: 50, opacity: 0, duration: 0.6, ease: "back.out(1.2)", delay: 0.2 });
        });
    </script>
</body>
</html>
