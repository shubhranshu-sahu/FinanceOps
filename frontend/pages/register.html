<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FinanceOps</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-neo py-3">
        <div class="container">
            <a class="navbar-brand fs-3 brand-font text-decoration-none" href="../index.html">FinanceOps</a>
            <div class="ms-auto">
                <a href="login.html" class="btn btn-neo bg-white">Login</a>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center mt-5 pt-3 mb-5 gs-reveal">
        <!-- We make register card pop a bit more with a yellow background -->
        <div class="card-neo p-5" style="width: 480px; background-color: #fde047;">
            <div class="text-center mb-4">
                <h2 class="brand-font display-6 mb-1">Register</h2>
                <p class="fw-bold" style="font-size: 1.1rem;">Create your operations account.</p>
            </div>
            
            <form id="registerForm">
                <div class="mb-4">
                    <label class="fw-bolder mb-2 fs-5">Full Name</label>
                    <input type="text" class="form-control form-control-lg" id="name" required placeholder="John Doe" style="font-size: 1.1rem; padding: 12px;">
                </div>
                
                <div class="mb-4">
                    <label class="fw-bolder mb-2 fs-5">Email Address</label>
                    <input type="email" class="form-control form-control-lg" id="email" required placeholder="you@example.com" style="font-size: 1.1rem; padding: 12px;">
                </div>
                
                <div class="mb-4">
                    <label class="fw-bolder mb-2 fs-5">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" required placeholder="••••••••" style="font-size: 1.1rem; padding: 12px;">
                </div>
                
                <button type="submit" class="btn btn-neo w-100 py-3 mt-2 fs-5 bg-white text-dark">Initialize Account</button>
            </form>
            
            <div class="mt-4 text-center">
                <p class="fw-bold fs-6">
                    Already operational? <br><a href="login.html" class="d-inline-block mt-2 fs-5" style="text-decoration: underline; text-decoration-thickness: 3px; text-underline-offset: 4px;">Login here</a>
                </p>
            </div>
            
            <div id="error" class="fw-bolder text-center mt-3 fs-5" style="color: var(--secondary-color);"></div>
            <!-- Dynamic Success Box style -->
            <div id="success" class="text-success fw-bolder text-center mt-4 fs-5 bg-white border border-dark border-3 py-3 px-3 shadow" style="display: none;"></div>
        </div>
    </div>

    <!-- JS -->
    <script src="../js/config.js"></script>
    <script src="../js/pages/register.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.from(".navbar", { y: -100, opacity: 0, duration: 0.5, ease: "power3.out" });
            gsap.from(".gs-reveal", { y: 50, opacity: 0, duration: 0.6, ease: "back.out(1.2)", delay: 0.2 });
            
            // Helper to handle the display of the success box in a neobrutalism way
            const successDiv = document.getElementById('success');
            const observer = new MutationObserver(() => {
                if(successDiv.innerText.trim() !== '') {
                    successDiv.style.display = 'block';
                    gsap.from(successDiv, { y: 20, opacity: 0, duration: 0.4, ease: "back.out(1.5)" });
                } else {
                    successDiv.style.display = 'none';
                }
            });
            observer.observe(successDiv, { childList: true, characterData: true, subtree: true });
        });
    </script>
</body>
</html>
