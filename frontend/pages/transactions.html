<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - FinanceOps</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- Global Loader -->
    <div id="loader" class="neo-loader-overlay d-none">
        <div class="neo-loader-spinner"></div>
        <div class="mt-4 brand-font fs-3 text-dark">PROCESSING...</div>
    </div>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-neo py-3 mb-5" style="background-color: var(--bg-color);">
        <div class="container">
            <a class="navbar-brand fs-3 brand-font text-dark text-decoration-none" href="#">[ Ops ] Dashboard</a>
            <button class="navbar-toggler border-dark border-3 rounded-0 bg-white" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2 align-items-lg-center">
                    <li class="nav-item"><a class="nav-link fw-bold text-dark nav-hover-fx px-3"
                            href="dashboard.html">Overview</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark border border-2 border-transparent px-3"
                            href="transactions.html"
                            style="background-color:#4ade80; border-color:#000!important; box-shadow: 2px 2px 0px #000;">Transactions</a>
                    </li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark nav-hover-fx px-3" href="categories.html"
                            id="catLink">Categories</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark nav-hover-fx px-3" href="users.html"
                            id="userLink">Users</a></li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0"><button
                            class="btn btn-neo bg-white py-1 px-3 w-100 fs-6 text-dark"
                            onclick="logout()">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5 gs-reveal">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="brand-font display-5 mb-0">/// Transactions Hub</h2>
            <button id="toggleRecycleBtn" class="btn btn-neo" style="background-color: #fde047;" onclick="toggleRecycle()">Toggle Recycle
                Bin</button>
        </div>

        <!-- Add Transaction -->
        <div id="adminSection" class="card-neo p-4 bg-white mb-5 gs-table">
            <h5 class="brand-font fs-3 mb-4 d-inline-block p-2 text-dark"
                style="background-color: var(--primary-color); border: 2px solid #000;">Record New Entry</h5>

            <div class="row g-3 align-items-end">
                <div class="col-md-2">
                    <label class="fw-bold text-dark mb-1">Amount</label>
                    <input type="number" id="amount" class="form-control form-control-lg border-dark border-3"
                        placeholder="0.00">
                </div>
                <div class="col-md-2">
                    <label class="fw-bold text-dark mb-1">Type</label>
                    <select id="type" class="form-select form-select-lg border-dark border-3">
                        <option value="INCOME">Income</option>
                        <option value="EXPENSE">Expense</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="fw-bold text-dark mb-1">Category</label>
                    <select id="category" class="form-select form-select-lg border-dark border-3"></select>
                </div>
                <div class="col-md-2">
                    <label class="fw-bold text-dark mb-1">Date</label>
                    <input type="date" id="date" class="form-control form-control-lg border-dark border-3">
                </div>
                <div class="col-md-3">
                    <label class="fw-bold text-dark mb-1">Description</label>
                    <input type="text" id="desc" class="form-control form-control-lg border-dark border-3"
                        placeholder="Brief note...">
                </div>
                <div class="col-12 mt-4 text-end">
                    <button class="btn btn-neo btn-neo-primary btn-lg px-5 mt-2" onclick="createTransaction()">Insert
                        Record</button>
                </div>
            </div>
        </div>

        <!-- Filter & Search Query Panel -->
        <div class="card-neo p-3 bg-light mb-5 border-3 border-dark gs-table" style="box-shadow: 4px 4px 0px #000;">
            <div class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="fw-bold fs-6 text-dark mb-1">Keywords</label>
                    <input type="text" id="filterSearch" class="form-control border-dark border-2 shadow-none"
                        placeholder="search...">
                </div>
                <div class="col-md-2">
                    <label class="fw-bold fs-6 text-dark mb-1">Type</label>
                    <select id="filterType" class="form-select border-dark border-2 shadow-none">
                        <option value="">All</option>
                        <option value="INCOME">Income</option>
                        <option value="EXPENSE">Expense</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="fw-bold fs-6 text-dark mb-1">Category</label>
                    <select id="filterCategory" class="form-select border-dark border-2 shadow-none">
                        <option value="">All</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="fw-bold fs-6 text-dark mb-1">Date</label>
                    <input type="date" id="filterDate" class="form-control border-dark border-2 shadow-none">
                </div>
                <div class="col-md-2">
                    <label class="fw-bold fs-6 text-dark mb-1">Sort By</label>
                    <select id="filterSort" class="form-select border-dark border-2 shadow-none">
                        <option value="created_desc">Latest Inserted</option>
                        <option value="date_desc">Newest Date</option>
                        <option value="date_asc">Oldest Date</option>
                        <option value="amount_desc">Highest Amount</option>
                        <option value="amount_asc">Lowest Amount</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-neo py-2 flex-grow-1" style="background-color: var(--primary-color);"
                        onclick="applyFilters()">Query</button>
                    <button class="btn btn-neo py-2 bg-white" onclick="resetFilters()">Clear</button>
                </div>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="card-neo p-0 bg-white gs-table overflow-hidden">
            <div class="table-responsive">
                <table class="table table-neo mb-0 text-dark">
                    <thead>
                        <tr class="fs-5">
                            <th>ID</th>
                            <th>Amount</th>
                            <th>Type</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Created By</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="txnTable" class="fw-bold text-dark fs-6"></tbody>
                </table>
            </div>

            <!-- Pagination Controls -->
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 p-3 border-top border-dark border-3"
                style="background-color: var(--card-bg);">
                <div class="d-flex align-items-center gap-2">
                    <label class="fw-bold text-dark">Rows Details:</label>
                    <select id="perPage" class="form-select border-dark border-3 rounded-0 bg-white"
                        style="width: auto; height: 42px;" onchange="changePerPage()">
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-neo py-1 px-3 bg-white" style="height: 42px;"
                        onclick="changePage(-1)">PREV</button>
                    <div class="fw-bold border border-3 border-dark px-4 py-2 bg-white text-dark d-flex align-items-center shadow-none"
                        style="height: 42px;" id="pageInfo">Page 1 / 1</div>
                    <button class="btn btn-neo py-1 px-3 bg-white" style="height: 42px;"
                        onclick="changePage(1)">NEXT</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <!-- Neobrutalist Modal Base -->
            <div class="modal-content border-dark border-3 rounded-0 bg-white" style="box-shadow: 12px 12px 0px #000;">
                <div class="p-4 pt-5 pb-5">
                    <h3 class="brand-font display-6 mb-4 border-bottom border-dark border-3 pb-3 text-dark">Amend Entry
                    </h3>
                    <input type="hidden" id="editId">

                    <div class="mb-4">
                        <label class="fw-bolder fs-5 text-dark mb-1">Amount</label>
                        <input type="number" id="editAmount"
                            class="form-control form-control-lg border-dark border-3 shadow-none">
                    </div>

                    <div class="mb-4">
                        <label class="fw-bolder fs-5 text-dark mb-1">Type</label>
                        <select id="editType" class="form-select form-select-lg border-dark border-3 shadow-none">
                            <option value="INCOME">Income</option>
                            <option value="EXPENSE">Expense</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="fw-bolder fs-5 text-dark mb-1">Category</label>
                        <select id="editCategory"
                            class="form-select form-select-lg border-dark border-3 shadow-none"></select>
                    </div>

                    <div class="mb-4">
                        <label class="fw-bolder fs-5 text-dark mb-1">Date</label>
                        <input type="date" id="editDate"
                            class="form-control form-control-lg border-dark border-3 shadow-none">
                    </div>

                    <div class="mb-5">
                        <label class="fw-bolder fs-5 text-dark mb-1">Description</label>
                        <input type="text" id="editDesc"
                            class="form-control form-control-lg border-dark border-3 shadow-none">
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-4 pt-2">
                        <button class="btn btn-neo bg-light" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-neo btn-neo-primary" onclick="submitEdit()">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/pages/transactions.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.from(".navbar", { y: -80, opacity: 0, duration: 0.5, ease: "power3.out" });
            gsap.from("h2", { x: -50, opacity: 0, duration: 0.6, ease: "back.out(1.2)" });
            gsap.from(".gs-table", { y: 60, opacity: 0, duration: 0.6, stagger: 0.2, delay: 0.2, ease: "back.out(1.2)" });
        });
    </script>
</body>

</html>
