<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - FinanceOps</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="../css/theme.css">
</head>

<body>
    <!-- Global Loader -->
    <div id="loader" class="neo-loader-overlay d-none">
        <div class="neo-loader-spinner"></div>
        <div class="mt-4 brand-font fs-3 text-dark">PROCESSING...</div>
    </div>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-neo py-3 mb-5" style="background-color: var(--bg-color);">
        <div class="container">
            <a class="navbar-brand fs-3 brand-font text-dark text-decoration-none" href="#">[ Ops ] Dashboard</a>
            <button class="navbar-toggler border-dark border-3 rounded-0 bg-white" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2 align-items-lg-center">
                    <li class="nav-item"><a class="nav-link fw-bold text-dark nav-hover-fx px-3"
                            href="dashboard.html">Overview</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark nav-hover-fx px-3"
                            href="transactions.html">Transactions</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark nav-hover-fx px-3" href="categories.html"
                            id="catLink">Categories</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-dark border border-2 border-transparent px-3"
                            href="users.html" id="userLink"
                            style="background-color:#4ade80; border-color:#000!important; box-shadow: 2px 2px 0px #000;">Users</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0"><button
                            class="btn btn-neo bg-white py-1 px-3 w-100 fs-6 text-dark"
                            onclick="logout()">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5 gs-reveal">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="brand-font display-5 mb-0">/// User Management</h2>
        </div>

        <!-- Users Table -->
        <div class="card-neo p-0 bg-white gs-table overflow-hidden shadow-none border-0">
            <div class="table-responsive">
                <table class="table table-neo mb-0 text-dark">
                    <thead>
                        <tr class="fs-5">
                            <th style="width: 5%">ID</th>
                            <th style="width: 25%">Identity</th>
                            <th style="width: 25%">Contact Address</th>
                            <th style="width: 15%">Privilege Node</th>
                            <th style="width: 10%">System Status</th>
                            <th style="width: 20%" class="text-center">Admin Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTable" class="fw-bold text-dark fs-6"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Role Modal -->
    <div class="modal fade" id="roleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <!-- Neobrutalist Modal Base -->
            <div class="modal-content border-dark border-3 rounded-0 bg-white" style="box-shadow: 12px 12px 0px #000;">
                <div class="p-4 pt-5 pb-5">
                    <h3 class="brand-font display-6 mb-4 border-bottom border-dark border-3 pb-3 text-dark">Modify
                        Security Node</h3>
                    <input type="hidden" id="editUserId">

                    <div class="mb-5 border border-3 border-dark p-3" style="background-color: var(--bg-color);">
                        <strong class="fs-4 d-block mb-1">Target Identity:</strong>
                        <span class="fs-4 font-monospace" id="editUserName"></span>
                    </div>

                    <div class="mb-4">
                        <label class="fw-bolder fs-5 text-dark mb-2">Assign Authorisation Classification:</label>
                        <select id="editRole"
                            class="form-select form-select-lg border-dark border-3 shadow-none fw-bold text-dark">
                            <option value="VIEWER">VIEWER - Standard Read Operation</option>
                            <option value="ANALYST">ANALYST - Extended Processing</option>
                            <option value="ADMIN">ADMIN - Absolute Override</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-5 pt-2">
                        <button class="btn btn-neo bg-light" data-bs-dismiss="modal">Abort</button>
                        <button class="btn btn-neo btn-neo-primary" onclick="submitRoleUpdate()">Escalate /
                            Modify</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/pages/users.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.from(".navbar", { y: -80, opacity: 0, duration: 0.5, ease: "power3.out" });
            gsap.from("h2", { x: -50, opacity: 0, duration: 0.6, ease: "back.out(1.2)" });
            gsap.from(".gs-table", { y: 60, opacity: 0, duration: 0.6, stagger: 0.2, delay: 0.2, ease: "back.out(1.2)" });
        });
    </script>
</body>

</html>
